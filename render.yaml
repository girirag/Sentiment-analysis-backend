services:
  - type: web
    name: video-sentiment-backend
    env: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: starter
    branch: main
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: WHISPER_MODEL
        value: base
      - key: SENTIMENT_MODEL
        value: distilbert-base-uncased-finetuned-sst-2-english
      - key: MAX_VIDEO_SIZE
        value: 500
      - key: STREAM_CHUNK_DURATION
        value: 10
      - key: FRONTEND_URL
        value: https://sentiment-analysis-frontend.vercel.app
      # Set these manually in Render dashboard:
      # FIREBASE_CREDENTIALS - paste firebase-key.json contents
      # FIREBASE_STORAGE_BUCKET
      # REDIS_URL - from Render Redis add-on
      # YOUTUBE_API_KEY
      # GOOGLE_TRANSLATE_API_KEY
      # GOOGLE_CLOUD_PROJECT_ID
